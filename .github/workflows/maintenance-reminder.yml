name: Quarterly Upgrade Maintenance Reminder

on:
  schedule:
    # Run daily at 9am PT (16:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - force

jobs:
  maintenance-reminder:
    runs-on: ubuntu-latest

    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:   ${{ secrets.SLACK_CHANNEL }}
      PROD_OCID:       ${{ secrets.PROD_OCID }}
      DEV1_OCID:       ${{ secrets.DEV1_OCID }}
      DEV2_OCID:       ${{ secrets.DEV2_OCID }}
      DEV3_OCID:       ${{ secrets.DEV3_OCID }}
      DEV4_OCID:       ${{ secrets.DEV4_OCID }}
      TEST_OCID:       ${{ secrets.TEST_OCID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/snac_oci_license_usage_api.pem
          chmod 600 ~/.oci/snac_oci_license_usage_api.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/snac_oci_license_usage_api.pem
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          pass_phrase=${{ secrets.OCI_PASS_PHRASE }}
          EOF
          chmod 600 ~/.oci/config

      - name: Run maintenance reminder
        run: |
          MODE="${{ github.event.inputs.mode || 'check' }}"
          python3 maintenance_reminder.py --mode "$MODE"
