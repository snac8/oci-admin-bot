name: Dev2 Refresh Thread Monitor

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:    ${{ secrets.SLACK_CHANNEL }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      DEV2_OCID:        ${{ secrets.DEV2_OCID }}
      PROD_OCID:        ${{ secrets.PROD_OCID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI credentials
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/snac_oci_license_usage_api.pem
          chmod 600 ~/.oci/snac_oci_license_usage_api.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          key_file=~/.oci/snac_oci_license_usage_api.pem
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          pass_phrase=${{ secrets.OCI_PASS_PHRASE }}
          EOF
          chmod 600 ~/.oci/config

      - name: Monitor thread for @fin-admin commands
        run: python3 slack_refresh_monitor.py
